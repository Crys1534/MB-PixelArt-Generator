<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraftifier Pro</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: 'Droid sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }
    .panel {
      background-color: #002363;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #213f77;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 600px;
      width: 100%;
    }
    .row {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }
    canvas {
      background-color: #222;
      border: 2px solid #555;
      max-width: 100%;
      height: auto;
      image-rendering: pixelated;
    }
    input[type="file"], input[type="range"], button {
      cursor: pointer;
    }
    input[type="range"] {
      flex-grow: 1;
    }
    .status {
      color: #a9f8dd;
      font-size: 14px;
    }
    .btn {
      background-color: #3b82f6;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background 0.3s;
    }
    .btn:hover {
      background-color: #2563eb;
    }
    .btn:disabled {
      background-color: #444;
      color: #777;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <h1>Textured Block Converter</h1>
  
  <div class="panel">
    <div class="row">
      <label><b>Upload the photo to convert:</b></label>
      <input type="file" id="uploadPhoto" accept="image/*">
    </div>
    <div class="row">
      <label>Final block size:</label>
      <input type="range" id="resolution" min="0.16" max="50" value="16" list="marks">
      <span id="resolutionValue">16px</span>
      
      <datalist id="marks">
        <option value="0.16"></option>
		<option value="1"></option>
        <option value="2"></option>
        <option value="3"></option>
        <option value="4"></option>
        <option value="5"></option>
        <option value="10"></option>
        <option value="20"></option>
        <option value="30"></option>
        <option value="40"></option>
        <option value="50"></option>
      </datalist>
    </div>
    <div class="row">
      <span id="sheetStatus" class="status">Loading textures from blocks.png...</span>
    </div>
    <div class="row" style="justify-content: center;">
      <button id="downloadBtn" class="btn" disabled>Download Image</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

<script>
  const uploadPhoto = document.getElementById('uploadPhoto');
  const resolutionSlider = document.getElementById('resolution');
  const resolutionValue = document.getElementById('resolutionValue');
  const sheetStatus = document.getElementById('sheetStatus');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const downloadBtn = document.getElementById('downloadBtn');
  
  let imgSheet = new Image();
  let imgPhoto = new Image();
  let dynamicPalette = [];
  const sSize = 16; 

  imgSheet.src = 'blocks.png'; 

  imgSheet.onload = function() {
    dynamicPalette = []; 
    const sheetCanvas = document.createElement('canvas');
    const sheetCtx = sheetCanvas.getContext('2d', { willReadFrequently: true });
    sheetCanvas.width = imgSheet.width;
    sheetCanvas.height = imgSheet.height;
    sheetCtx.drawImage(imgSheet, 0, 0);

    for (let sy = 0; sy < imgSheet.height; sy += sSize) {
      for (let sx = 0; sx < imgSheet.width; sx += sSize) {
        const imageData = sheetCtx.getImageData(sx, sy, sSize, sSize);
        const data = imageData.data;
        let r = 0, g = 0, b = 0, count = 0;
        
        for (let i = 0; i < data.length; i += 4) {
          if (data[i + 3] > 128) { 
            r += data[i]; g += data[i + 1]; b += data[i + 2];
            count++;
          }
        }
        
        if (count > 0) { 
          dynamicPalette.push({
            sx, sy, r: Math.round(r / count), g: Math.round(g / count), b: Math.round(b / count)
          });
        }
      }
    }
    sheetStatus.textContent = `Ready! Loaded ${dynamicPalette.length} blocks.`;
    processImage();
  };

  imgSheet.onerror = function() {
    sheetStatus.textContent = 'Error: "blocks.png" not found.';
    sheetStatus.style.color = '#ff6b6b';
  };

  resolutionSlider.addEventListener('wheel', function(e) {
    e.preventDefault(); 
    let val = parseInt(this.value);
    
    if (e.deltaY < 0) {
      val = Math.min(parseInt(this.max), val + 1);
    } else {
      val = Math.max(parseInt(this.min), val - 1);
    }
    
    this.value = val;
    resolutionValue.textContent = this.value + 'px';
    processImage();
  });

  uploadPhoto.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = e => imgPhoto.src = e.target.result;
      reader.readAsDataURL(file);
    }
  });

  imgPhoto.onload = processImage;

  resolutionSlider.addEventListener('input', function() {
    resolutionValue.textContent = this.value + 'px';
    processImage();
  });

  function processImage() {
    if (!imgPhoto.src || dynamicPalette.length === 0) return;
    
    const blockSize = parseInt(resolutionSlider.value);
    canvas.width = imgPhoto.width;
    canvas.height = imgPhoto.height;
    
    ctx.drawImage(imgPhoto, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < canvas.height; y += blockSize) {
      for (let x = 0; x < canvas.width; x += blockSize) {
        
        // --- NUEVA LÓGICA: Promedio de color por área de bloque ---
        let sumR = 0, sumG = 0, sumB = 0, count = 0;

        // Recorremos los píxeles de la foto que caen dentro de este "chunk"
        for (let cy = 0; cy < blockSize; cy++) {
          for (let cx = 0; cx < blockSize; cx++) {
            let px = x + cx;
            let py = y + cy;
            
            // Asegurarnos de no salirnos de los bordes de la imagen
            if (px < canvas.width && py < canvas.height) {
              let i = (py * canvas.width + px) * 4;
              if (data[i + 3] > 128) { // Ignorar píxeles transparentes
                sumR += data[i];
                sumG += data[i + 1];
                sumB += data[i + 2];
                count++;
              }
            }
          }
        }

        if (count === 0) continue; // Si el área está vacía, saltar

        // Calculamos el color promedio del área
        const targetR = Math.round(sumR / count);
        const targetG = Math.round(sumG / count);
        const targetB = Math.round(sumB / count);
        // -----------------------------------------------------------

        let minDistance = Infinity;
        let chosenBlock = dynamicPalette[0];

        // Buscamos el bloque en nuestra paleta que más se parezca al promedio calculado
        for (let block of dynamicPalette) {
          let distance = Math.pow(targetR - block.r, 2) + Math.pow(targetG - block.g, 2) + Math.pow(targetB - block.b, 2);
          if (distance < minDistance) {
            minDistance = distance;
            chosenBlock = block;
          }
        }
        
        ctx.drawImage(imgSheet, chosenBlock.sx, chosenBlock.sy, sSize, sSize, x, y, blockSize, blockSize);
      }
    }
    
    downloadBtn.disabled = false;
  }

  downloadBtn.addEventListener('click', function() {
    const link = document.createElement('a');
    link.download = 'pixel_art.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
</script>
</body>
</html>
