<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraftificador con Spritesheet</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: 'Droid sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }
    .panel {
      background-color: #002363;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #213f77;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 600px;
      width: 100%;
    }
    .fila {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }
    canvas {
      background-color: #222;
      border: 2px solid #555;
      max-width: 100%;
      height: auto;
      image-rendering: pixelated;
    }
    input[type="file"], input[type="number"], input[type="range"] {
      cursor: pointer;
    }
    input[type="number"] {
      width: 50px;
      background: #222;
      color: white;
      border: 1px solid #555;
      padding: 3px;
    }
    .estado {
      color: #a9f8dd;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Convertidor a Bloques Texturizados</h1>
  
  <div class="panel">
    <div class="fila">
      <label><b>1. Sube tu Spritesheet:</b></label>
      <input type="file" id="uploadSheet" accept="image/*">
    </div>
    <div class="fila">
      <label>Tamaño de cada bloque en el spritesheet (ej. 16px):</label>
      <input type="number" id="spriteSize" value="16" min="8" max="128">
      <span id="estadoSheet" class="estado">Esperando spritesheet...</span>
    </div>
    
    <hr style="border-color: #213f77; width: 100%;">

    <div class="fila">
      <label><b>2. Sube la foto a convertir:</b></label>
      <input type="file" id="uploadFoto" accept="image/*">
    </div>
    <div class="fila">
      <label>Tamaño del bloque final:</label>
      <input type="range" id="resolucion" min="5" max="50" value="16">
      <span id="valorResolucion">16px</span>
    </div>
  </div>

  <canvas id="canvas"></canvas>

<script>
  const uploadSheet = document.getElementById('uploadSheet');
  const uploadFoto = document.getElementById('uploadFoto');
  const resolucionSlider = document.getElementById('resolucion');
  const valorResolucion = document.getElementById('valorResolucion');
  const inputSpriteSize = document.getElementById('spriteSize');
  const estadoSheet = document.getElementById('estadoSheet');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  
  let imgSheet = new Image();
  let imgFoto = new Image();
  let paletaDinamica = []; // Guardará las coordenadas y el color promedio de cada bloque del sheet

  // 1. Cargar y procesar el Spritesheet
  uploadSheet.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = e => imgSheet.src = e.target.result;
      reader.readAsDataURL(file);
    }
  });

  imgSheet.onload = function() {
    paletaDinamica = []; // Reiniciar la paleta
    const sSize = parseInt(inputSpriteSize.value);
    
    // Usamos un canvas invisible para leer los píxeles del spritesheet
    const sheetCanvas = document.createElement('canvas');
    const sheetCtx = sheetCanvas.getContext('2d', { willReadFrequently: true });
    sheetCanvas.width = imgSheet.width;
    sheetCanvas.height = imgSheet.height;
    sheetCtx.drawImage(imgSheet, 0, 0);

    // Recorrer el spritesheet como si fuera una cuadrícula
    for (let sy = 0; sy < imgSheet.height; sy += sSize) {
      for (let sx = 0; sx < imgSheet.width; sx += sSize) {
        
        const imageData = sheetCtx.getImageData(sx, sy, sSize, sSize);
        const data = imageData.data;
        
        let r = 0, g = 0, b = 0, count = 0;

        // Calcular el color promedio de este cuadrito del spritesheet
        for (let i = 0; i < data.length; i += 4) {
          if (data[i + 3] > 128) { // Solo píxeles no transparentes
            r += data[i];
            g += data[i + 1];
            b += data[i + 2];
            count++;
          }
        }

        if (count > 0) { // Si el bloque no está vacío/transparente
          paletaDinamica.push({
            sx: sx, 
            sy: sy, 
            r: Math.round(r / count), 
            g: Math.round(g / count), 
            b: Math.round(b / count)
          });
        }
      }
    }
    estadoSheet.textContent = `¡Listo! Se extrajeron ${paletaDinamica.length} bloques.`;
    procesarImagen(); // Por si ya había una foto cargada
  };

  // 2. Cargar la foto
  uploadFoto.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = e => imgFoto.src = e.target.result;
      reader.readAsDataURL(file);
    }
  });

  imgFoto.onload = procesarImagen;

  resolucionSlider.addEventListener('input', function() {
    valorResolucion.textContent = this.value + 'px';
    procesarImagen();
  });

  // 3. La magia: Convertir la foto usando las texturas
  function procesarImagen() {
    if (!imgFoto.src || paletaDinamica.length === 0) return;

    const blockSize = parseInt(resolucionSlider.value);
    const sSize = parseInt(inputSpriteSize.value);
    
    canvas.width = imgFoto.width;
    canvas.height = imgFoto.height;

    // Dibujamos la foto original para leer sus colores
    ctx.drawImage(imgFoto, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < canvas.height; y += blockSize) {
      for (let x = 0; x < canvas.width; x += blockSize) {
        
        const i = (y * canvas.width + x) * 4;
        const targetR = data[i];
        const targetG = data[i + 1];
        const targetB = data[i + 2];
        const targetA = data[i + 3];

        if (targetA < 128) continue; // Ignorar fondo transparente

        // Encontrar el bloque del spritesheet con el color promedio más cercano
        let distanciaMinima = Infinity;
        let bloqueElegido = paletaDinamica[0];

        for (let bloque of paletaDinamica) {
          let distancia = Math.pow(targetR - bloque.r, 2) + Math.pow(targetG - bloque.g, 2) + Math.pow(targetB - bloque.b, 2);
          if (distancia < distanciaMinima) {
            distanciaMinima = distancia;
            bloqueElegido = bloque;
          }
        }

        // Dibujar el recorte exacto del spritesheet en el canvas final
        ctx.drawImage(
          imgSheet, 
          bloqueElegido.sx, bloqueElegido.sy, sSize, sSize, // Qué parte del sheet recortar
          x, y, blockSize, blockSize                        // Dónde dibujarlo y a qué tamaño
        );
      }
    }
  }
</script>
</body>
</html>
